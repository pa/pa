<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" preserveAspectRatio="xMidYMid meet" role="img" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace">
  <title>Pramodh Ayyappan — terraform apply for module.engineer.pa</title>

  <!-- Master loop: 13s cycle, restarts everything -->
  <rect width="0" height="0" fill="none" display="none">
    <animate id="loop" attributeName="x" from="0" to="0" begin="0s; loop.end+1s" dur="13s"/>
  </rect>

  <defs>
    <!-- Timeline (all relative to loop.begin):
         0.3  $ terraform apply -auto-approve
         1.0  module.engineer.pa.identity refreshing
         1.3  module.engineer.pa.skills["k8s"] refreshing
         2.0  "Terraform will perform the following actions:"
         2.4  + role
         2.7  + company
         3.0  + location
         3.3  + focus
         4.0  Plan summary
         5.0  Apply complete!
         5.5  Outputs:
         5.8  status output
         6.1  uptime output
        13.0  loop.end -> all elements reset, +1s pause, restart -->
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#0a0a0a"/>
  <!-- Frame border -->
  <rect x="0.5" y="0.5" width="799" height="419" fill="none" stroke="#1a4a2a" stroke-width="1"/>
  <!-- Titlebar -->
  <rect x="1" y="1" width="798" height="28" fill="#0d2a14"/>
  <line x1="1" y1="29.5" x2="799" y2="29.5" stroke="#1a4a2a" stroke-width="1"/>
  <text x="20" y="20" fill="#2a5e3a" font-size="11">~/career — terraform apply</text>

  <!-- Body -->
  <g font-size="13">
    <!-- $ terraform apply -auto-approve -->
    <g opacity="0">
      <text x="20" y="60">
        <tspan fill="#557755">$ </tspan><tspan fill="#7b42bc">terraform</tspan><tspan fill="#ccffcc"> apply -auto-approve</tspan>
      </text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+0.3s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>

    <!-- Refresh lines (muted) -->
    <g opacity="0">
      <text x="20" y="92" fill="#557755">module.engineer.pa.identity: Refreshing state... [id=pa-2015]</text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+1.0s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="20" y="110" fill="#557755">module.engineer.pa.skills["k8s"]: Refreshing state... [id=8y-senior]</text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+1.3s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>

    <!-- Plan header -->
    <g opacity="0">
      <text x="20" y="142" fill="#ccffcc">Terraform will perform the following actions:</text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+2.0s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>

    <!-- + create lines -->
    <g opacity="0">
      <text x="40" y="170">
        <tspan fill="#00ff41">+ </tspan><tspan fill="#ccffcc" xml:space="preserve">module.engineer.pa.role        = "Tech Lead DevOps"</tspan>
      </text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+2.4s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="40" y="188">
        <tspan fill="#00ff41">+ </tspan><tspan fill="#ccffcc" xml:space="preserve">module.engineer.pa.company     = "Facets.cloud"</tspan>
      </text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+2.7s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="40" y="206">
        <tspan fill="#00ff41">+ </tspan><tspan fill="#ccffcc" xml:space="preserve">module.engineer.pa.location    = "Chennai, IN"</tspan>
      </text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+3.0s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="40" y="224">
        <tspan fill="#00ff41">+ </tspan><tspan fill="#ccffcc" xml:space="preserve">module.engineer.pa.focus       = "Internal Developer Platforms"</tspan>
      </text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+3.3s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>

    <!-- Plan summary -->
    <g opacity="0">
      <text x="20" y="256">
        <tspan fill="#ccffcc">Plan: </tspan><tspan fill="#00ff41">4 to add</tspan><tspan fill="#ccffcc">, </tspan><tspan fill="#557755">0 to change</tspan><tspan fill="#ccffcc">, </tspan><tspan fill="#ff5555">0 to destroy</tspan><tspan fill="#ccffcc">.</tspan>
      </text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+4.0s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>

    <!-- Apply complete -->
    <g opacity="0">
      <text x="20" y="288">
        <tspan fill="#00ff41" font-weight="bold">Apply complete!</tspan><tspan fill="#ccffcc"> Resources: 4 added, 0 changed, 0 destroyed.</tspan>
      </text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+5.0s" dur="0.3s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>

    <!-- Outputs -->
    <g opacity="0">
      <text x="20" y="320" fill="#ccffcc">Outputs:</text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+5.5s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="40" y="345">
        <tspan fill="#00cc33">status</tspan><tspan fill="#557755" xml:space="preserve">  = </tspan><tspan fill="#ccffcc">"shipping ✓"</tspan>
      </text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+5.8s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="40" y="365">
        <tspan fill="#00cc33">uptime</tspan><tspan fill="#557755" xml:space="preserve">  = </tspan><tspan fill="#ccffcc">"11+ years"</tspan>
      </text>
      <animate attributeName="opacity" from="0" to="1" begin="loop.begin+6.1s" dur="0.2s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="loop.end" dur="0.001s" fill="freeze"/>
    </g>

    <!-- Persistent prompt with blinking cursor -->
    <text x="20" y="395" fill="#00ff41">
      <tspan>$ </tspan><tspan>▊</tspan>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
