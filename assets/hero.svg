<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" preserveAspectRatio="xMidYMid meet" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace">
  <defs>
    <clipPath id="type1">
      <rect x="0" y="0" width="0" height="360">
        <animate attributeName="width" from="0" to="220" begin="0.6s" dur="1.4s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="type2">
      <rect x="0" y="0" width="0" height="360">
        <animate attributeName="width" from="0" to="240" begin="3.2s" dur="1.4s" fill="freeze"/>
      </rect>
    </clipPath>
    <filter id="phosphor" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="360" fill="#0a0a0a"/>
  <!-- Frame border -->
  <rect x="0.5" y="0.5" width="799" height="359" fill="none" stroke="#1a4a2a" stroke-width="1"/>
  <!-- Titlebar -->
  <rect x="1" y="1" width="798" height="28" fill="#0d2a14"/>
  <line x1="1" y1="29" x2="799" y2="29" stroke="#1a4a2a" stroke-width="1"/>
  <text x="20" y="20" fill="#2a5e3a" font-size="11">~/pramodh.ayyappan — bash</text>
  <!-- Body group -->
  <g font-size="14">
    <!-- Line 1: prompt + typed command -->
    <text x="20" y="60">
      <tspan fill="#00ff41">pa@dev</tspan><tspan fill="#2a5e3a">:</tspan><tspan fill="#00aaff">~</tspan><tspan fill="#ccffcc">$ </tspan>
    </text>
    <g clip-path="url(#type1)">
      <text x="115" y="60" fill="#ccffcc">cat profile.txt</text>
    </g>
    <!-- Cursor moves with typing -->
    <text x="115" y="60" fill="#00ff41">
      <tspan>▊</tspan>
      <animate attributeName="x" from="115" to="227" begin="0.6s" dur="1.4s" fill="freeze"/>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
    </text>
    <!-- ASCII figlet name (revealed after line 1 finishes) -->
    <g fill="#00ff41" filter="url(#phosphor)" font-size="13" opacity="0">
      <text x="40" y="100" xml:space="preserve"> ____  ____    _   __  __  ___  ___  _  _</text>
      <text x="40" y="115" xml:space="preserve">| _ \| _ \  /_\ |  \/  |/ _ \|   \| || |</text>
      <text x="40" y="130" xml:space="preserve">|  _/|   / / _ \| |\/| | (_) | |) | __ |</text>
      <text x="40" y="145" xml:space="preserve">|_|  |_|_\/_/ \_\_|  |_|\___/|___/|_||_|</text>
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.6s" fill="freeze"/>
    </g>
    <!-- Subtitle -->
    <text x="40" y="170" fill="#557755" font-size="11" letter-spacing="1.2" opacity="0">
      // TECH LEAD DEVOPS @ FACETS.CLOUD
      <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.4s" fill="freeze"/>
    </text>
    <!-- Line 2: cat whoami.json -->
    <text x="20" y="210" opacity="0">
      <tspan fill="#00ff41">pa@dev</tspan><tspan fill="#2a5e3a">:</tspan><tspan fill="#00aaff">~</tspan><tspan fill="#ccffcc">$ </tspan>
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.2s" fill="freeze"/>
    </text>
    <g clip-path="url(#type2)">
      <text x="115" y="210" fill="#ccffcc">cat whoami.json</text>
    </g>

    <!-- JSON output -->
    <g font-size="13" opacity="0">
      <text x="20" y="240">
        <tspan fill="#557755">{</tspan>
      </text>
      <text x="40" y="258">
        <tspan fill="#00cc33">"role"</tspan><tspan fill="#557755">: </tspan><tspan fill="#ccffcc">"Tech Lead DevOps"</tspan><tspan fill="#557755">,</tspan>
      </text>
      <text x="40" y="276">
        <tspan fill="#00cc33">"company"</tspan><tspan fill="#557755">: </tspan><tspan fill="#ccffcc">"Facets.cloud"</tspan><tspan fill="#557755">,</tspan>
      </text>
      <text x="40" y="294">
        <tspan fill="#00cc33">"focus"</tspan><tspan fill="#557755">: </tspan><tspan fill="#ccffcc">"Internal Developer Platforms · Cloud · DX"</tspan><tspan fill="#557755">,</tspan>
      </text>
      <text x="40" y="312">
        <tspan fill="#00cc33">"location"</tspan><tspan fill="#557755">: </tspan><tspan fill="#ccffcc">"Chennai, IN"</tspan>
      </text>
      <text x="20" y="330">
        <tspan fill="#557755">}</tspan>
      </text>
      <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.5s" fill="freeze"/>
    </g>
  </g>
</svg>
